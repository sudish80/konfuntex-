apiVersion: v1
kind: Secret
metadata:
  name: {{ include "colab-agent.fullname" . }}
  labels:
    {{- include "colab-agent.labels" . | nindent 4 }}
type: Opaque
data:
  apiKey: {{ .Values.secrets.apiKey | b64enc | quote }}
  dbPassword: {{ .Values.secrets.dbPassword | b64enc | quote }}
  openaiApiKey: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  hfToken: {{ .Values.secrets.hfToken | b64enc | quote }}
  githubToken: {{ .Values.secrets.githubToken | b64enc | quote }}
  sentryDsn: {{ .Values.secrets.sentryDsn | b64enc | quote }}
